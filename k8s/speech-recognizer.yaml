apiVersion: v1
kind: Namespace
metadata:
  name: speech
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: hf-cache-pv
spec:
  capacity:
    storage: 20Gi
  accessModes: [ReadWriteOnce]
  hostPath:
    path: /acsa/hf-models
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hf-cache-pvc
  namespace: speech
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
  volumeName: hf-cache-pv
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speech-recognizer
  namespace: speech
  labels:
    app: speech-recognizer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: speech-recognizer
  template:
    metadata:
      labels:
        app: speech-recognizer
    spec:
      runtimeClassName: nvidia
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: mic-access
        image: localhost:5000/mic-access:latest
        imagePullPolicy: Always
        command: ["python3", "access_mic.py"]
        tty: true
        stdin: true
        env:
        - name: HF_HOME
          value: /hf-cache
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,utility
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: OMP_NUM_THREADS
          value: "4"
        - name: MKL_NUM_THREADS
          value: "4"
        resources:
          requests:
            memory: "8Gi"
            cpu: "2"
            nvidia.com/gpu: 1
          limits:
            memory: "12Gi"
            cpu: "4"
            nvidia.com/gpu: 1
        startupProbe:
          exec:
            command: ["python3", "-c", "import torch; assert torch.cuda.is_available()"]
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          exec:
            command: ["python3", "-c", "import os; assert os.path.exists('/dev/snd')"]
          periodSeconds: 60
          failureThreshold: 3
        volumeMounts:
        - name: hf-cache
          mountPath: /hf-cache
        - name: snd
          mountPath: /dev/snd
        - name: video0
          mountPath: /dev/video0
        securityContext:
          privileged: true
      volumes:
      - name: hf-cache
        persistentVolumeClaim:
          claimName: hf-cache-pvc
      - name: snd
        hostPath:
          path: /dev/snd
          type: Directory
      - name: video0
        hostPath:
          path: /dev/video0
          type: ""
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
