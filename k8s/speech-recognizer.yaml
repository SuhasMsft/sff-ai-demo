apiVersion: v1
kind: Namespace
metadata:
  name: speech
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speech-recognizer
  namespace: speech
  labels:
    app: speech-recognizer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: speech-recognizer
  template:
    metadata:
      labels:
        app: speech-recognizer
    spec:
      # NOTE: runtimeClassName: nvidia removed — Azure Linux 1.17.8 toolkit has
      # broken nvidia-container-runtime-hook. Using privileged + device mounts instead.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: mic-access
        image: localhost:5000/mic-access:latest
        imagePullPolicy: Always
        command: ["python3", "access_mic.py"]
        tty: true
        stdin: true
        env:
        - name: HF_HOME
          value: /hf-cache
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,utility
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: OMP_NUM_THREADS
          value: "4"
        - name: MKL_NUM_THREADS
          value: "4"
        - name: LD_LIBRARY_PATH
          value: /usr/lib64
        resources:
          requests:
            memory: "8Gi"
            cpu: "2"
          limits:
            memory: "12Gi"
            cpu: "4"
        startupProbe:
          exec:
            command: ["python3", "-c", "import torch; assert torch.cuda.is_available()"]
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 18
        livenessProbe:
          exec:
            command: ["python3", "-c", "import os; assert os.path.exists('/dev/snd')"]
          periodSeconds: 60
          failureThreshold: 3
        volumeMounts:
        - name: hf-cache
          mountPath: /hf-cache
        - name: snd
          mountPath: /dev/snd
        - name: nvidia0
          mountPath: /dev/nvidia0
        - name: nvidiactl
          mountPath: /dev/nvidiactl
        - name: nvidia-uvm
          mountPath: /dev/nvidia-uvm
        securityContext:
          privileged: true
      volumes:
      - name: hf-cache
        hostPath:
          path: /acsa/hf-models
          type: DirectoryOrCreate
      - name: snd
        hostPath:
          path: /dev/snd
          type: Directory
      - name: nvidia0
        hostPath:
          path: /dev/nvidia0
          type: CharDevice
      - name: nvidiactl
        hostPath:
          path: /dev/nvidiactl
          type: CharDevice
      - name: nvidia-uvm
        hostPath:
          path: /dev/nvidia-uvm
          type: CharDevice
